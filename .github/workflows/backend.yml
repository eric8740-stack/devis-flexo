name: backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      # Sprint 4 Lot 4e — libs système weasyprint (GTK/Cairo/Pango runtime).
      # Mêmes paquets que le Dockerfile Railway prod.
      - name: Install weasyprint system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b libcairo2 \
            libgdk-pixbuf-2.0-0 fonts-liberation

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply Alembic migrations (cree la DB SQLite + tables)
        run: alembic upgrade head

      - name: Run pytest
        run: pytest -v

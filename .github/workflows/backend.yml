name: backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # P1+P2 : service Postgres pour le test FK strictes
    # (test_migration_unify_machine_p1p2_postgres.py). Sans ce service,
    # le test est skip et la migration P1+P2 n'est pas validee sous FK
    # strictes (scenario reel du boot Railway prod).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Le test postgres FK strictes le lit pour cibler le service ci-dessus.
      # Le reste des tests continue d'utiliser SQLite (DATABASE_URL non set
      # -> fallback sqlite:///./devis_flexo.db de app/db.py).
      PG_TEST_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13.5
        uses: actions/setup-python@v5
        with:
          # Patch exact (et non "3.13" flottant) pour une CI déterministe,
          # reproductible et alignée sur un interpréteur connu.
          python-version: "3.13.5"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      # Sprint 4 Lot 4e — libs système weasyprint (GTK/Cairo/Pango runtime).
      # Mêmes paquets que le Dockerfile Railway prod.
      - name: Install weasyprint system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b libcairo2 \
            libgdk-pixbuf-2.0-0 fonts-liberation

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Garde-fou parité prod : WeasyPrint est pinné weasyprint==65.1 dans
      # requirements.txt (source unique, partagée avec le Dockerfile Railway).
      # Cette étape échoue la CI si la version installée dérive de 65.1 —
      # on fige la version du moteur PDF sur celle de la prod. On lit la
      # métadonnée du paquet (pas `import weasyprint`) : la version se
      # vérifie sans charger les libs natives GTK/Pango.
      - name: Verify WeasyPrint pinned to prod version (65.1)
        run: |
          python -c "from importlib.metadata import version; v = version('weasyprint'); assert v == '65.1', f'WeasyPrint {v} != 65.1 attendu (parite Dockerfile prod)'; print('WeasyPrint', v, 'OK')"

      - name: Apply Alembic migrations (cree la DB SQLite + tables)
        run: alembic upgrade head

      - name: Run pytest
        run: pytest -v
